name: Check WeChat Linux Version

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml
    
    - name: Check version
      id: check
      run: |
        python scripts/check_version.py
        
        # 读取最新版本
        if [ -f "data/versions.json" ]; then
          VERSION=$(jq -r '.latest_version' data/versions.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 检查是否已发布
          if [ ! -f "data/last_release_version.txt" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif [ "$VERSION" != "$(cat data/last_release_version.txt)" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "No version data found"
          echo "should_release=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Download packages
      if: steps.check.outputs.should_release == 'true'
      run: |
        VERSION="${{ steps.check.outputs.version }}"
        echo "Version: $VERSION"
        
        # 下载文件
        wget -q -O "wechat_linux_x86_${VERSION}.deb" \
          "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_x86_64.deb"
        wget -q -O "wechat_linux_x86_${VERSION}.rpm" \
          "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_x86_64.rpm"
        wget -q -O "wechat_linux_x86_${VERSION}.AppImage" \
          "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_x86_64.AppImage"
        
        wget -q -O "wechat_linux_arm64_${VERSION}.deb" \
          "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_arm64.deb"
        wget -q -O "wechat_linux_arm64_${VERSION}.rpm" \
          "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_arm64.rpm"
        wget -q -O "wechat_linux_arm64_${VERSION}.AppImage" \
          "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_arm64.AppImage"
        
        wget -q -O "wechat_linux_loongarch_${VERSION}.deb" \
          "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_LoongArch.deb"
        
        # 创建简单的release说明
        echo "# WeChat Linux $VERSION" > release_notes.md
        echo "" >> release_notes.md
        echo "## 文件列表" >> release_notes.md
        echo "" >> release_notes.md
        for file in *.deb *.rpm *.AppImage; do
          if [ -f "$file" ]; then
            echo "- $file" >> release_notes.md
          fi
        done
    
    - name: Create Release
      if: steps.check.outputs.should_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v${{ steps.check.outputs.version }}"
        name: "WeChat Linux v${{ steps.check.outputs.version }}"
        body_path: release_notes.md
        files: |
          *.deb
          *.rpm
          *.AppImage
    
    - name: Update version record
      if: steps.check.outputs.should_release == 'true'
      run: |
        echo "${{ steps.check.outputs.version }}" > data/last_release_version.txt
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/last_release_version.txt data/versions.json
        git commit -m "Add WeChat Linux v${{ steps.check.outputs.version }}" || echo "No changes"
        git push || echo "Nothing to push"