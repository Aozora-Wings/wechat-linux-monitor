name: Check WeChat Linux Version

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml
    
    - name: Check version
      id: check
      run: |
        python scripts/check_version.py
        
        # 读取输出
        if [ -f "data/pending_version.txt" ]; then
          VERSION=$(cat data/pending_version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "has_new_version=true" >> $GITHUB_OUTPUT
          echo "发现新版本: $VERSION"
        else
          echo "has_new_version=false" >> $GITHUB_OUTPUT
          echo "没有新版本"
        fi
    
    - name: Download and calculate hashes
      if: steps.check.outputs.has_new_version == 'true'
      id: download
      run: |
        python scripts/download_and_hash.py
        
        # 检查下载是否成功
        if [ -f "data/versions.json" ]; then
          VERSION="${{ steps.check.outputs.version }}"
          # 验证版本是否已保存
          if jq -e --arg v "$VERSION" '.versions[] | select(.version == $v)' data/versions.json > /dev/null; then
            echo "download_success=true" >> $GITHUB_OUTPUT
          else
            echo "download_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        else
          echo "download_success=false" >> $GITHUB_OUTPUT
          exit 1
        fi
    
    - name: Generate release notes
      if: steps.download.outputs.download_success == 'true'
      run: |
        VERSION="${{ steps.check.outputs.version }}"
        
        echo "# WeChat Linux $VERSION" > release_notes.md
        echo "" >> release_notes.md
        echo "## 文件列表" >> release_notes.md
        echo "" >> release_notes.md
        
        # 使用 jq 提取文件信息并生成 release notes
        jq -r --arg version "$VERSION" '
          .versions[] | select(.version == $version) | 
          .files | to_entries[] | 
          .key as $arch | 
          .value | to_entries[] | 
          .key as $pkg_type | 
          .value | 
          "### \(.filename)" + 
          "\n- **SHA256**: `\(.sha256)`" + 
          "\n- **大小**: \(.size) 字节" + 
          "\n- **原始 URL**: \(.url)" + 
          "\n"
        ' data/versions.json >> release_notes.md
        
        echo "## Nix 格式哈希" >> release_notes.md
        echo "" >> release_notes.md
        echo "```nix" >> release_notes.md
        
        jq -r --arg version "$VERSION" '
          .versions[] | select(.version == $version) | 
          .files | to_entries[] | 
          .key as $arch | 
          .value | to_entries[] | 
          .key as $pkg_type | 
          .value | 
          "# \(.filename)" + 
          "\nsha256 = \"\(.sha256)\";" + 
          "\n"
        ' data/versions.json >> release_notes.md
        
        echo "```" >> release_notes.md
    
    - name: Create Release
      if: steps.download.outputs.download_success == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v${{ steps.check.outputs.version }}"
        name: "WeChat Linux v${{ steps.check.outputs.version }}"
        body_path: release_notes.md
        files: |
          *.deb
          *.rpm
          *.appimage
    
    - name: Update last release version
      if: steps.download.outputs.download_success == 'true'
      run: |
        VERSION="${{ steps.check.outputs.version }}"
        
        # 更新 last_release_version.txt
        echo "$VERSION" > data/last_release_version.txt
        
        # 提交更改
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/last_release_version.txt data/versions.json
        git commit -m "Update to WeChat Linux v$VERSION" || echo "No changes"
        git push || echo "Nothing to push"
    
    - name: Cleanup
      if: always()
      run: |
        # 清理临时文件
        rm -f data/pending_version.txt
        # 可选：清理下载的文件，避免占用空间
        rm -f *.deb *.rpm *.appimage