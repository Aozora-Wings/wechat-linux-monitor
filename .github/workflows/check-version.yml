name: Check WeChat Linux Version

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml
    
    - name: Check version
      id: check
      run: |
        python scripts/check_version.py
        
        # 读取最新版本
        if [ -f "data/versions.json" ]; then
          VERSION=$(jq -r '.latest_version' data/versions.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 检查是否已发布
          if [ ! -f "data/last_release_version.txt" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif [ "$VERSION" != "$(cat data/last_release_version.txt)" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "No version data found"
          echo "should_release=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Get current timestamp
      if: steps.check.outputs.should_release == 'true'
      id: timestamp
      run: |
        echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
    
    - name: Run version check with hash calculation
      if: steps.check.outputs.should_release == 'true'
      run: |
        # Python脚本现在会处理所有哈希计算和版本更新
        python scripts/check_version.py
        
        # 从 versions.json 生成 release notes
        VERSION="${{ steps.check.outputs.version }}"
        
        echo "# WeChat Linux $VERSION" > release_notes.md
        echo "" >> release_notes.md
        echo "## 文件列表" >> release_notes.md
        echo "" >> release_notes.md
        
        # 使用 jq 提取文件信息并生成 release notes
        jq -r --arg version "$VERSION" '
          .versions[] | select(.version == $version) | 
          .files | to_entries[] | 
          .key as $arch | 
          .value | to_entries[] | 
          .key as $pkg_type | 
          .value | 
          "### \(.filename)" + 
          "\n- **SHA256**: `\(.sha256)`" + 
          "\n- **大小**: \(.size) 字节" + 
          "\n- **原始 URL**: \(.url)" + 
          "\n"
        ' data/versions.json >> release_notes.md
        
        echo "## Nix 格式哈希" >> release_notes.md
        echo "" >> release_notes.md
        echo "```nix" >> release_notes.md
        
        jq -r --arg version "$VERSION" '
          .versions[] | select(.version == $version) | 
          .files | to_entries[] | 
          .key as $arch | 
          .value | to_entries[] | 
          .key as $pkg_type | 
          .value | 
          "# \(.filename)" + 
          "\nsha256 = \"\(.sha256)\";" + 
          "\n"
        ' data/versions.json >> release_notes.md
        
        echo "```" >> release_notes.md
    
    - name: Create Release
      if: steps.check.outputs.should_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "v${{ steps.check.outputs.version }}"
        name: "WeChat Linux v${{ steps.check.outputs.version }}"
        body_path: release_notes.md
        files: |
          *.deb
          *.rpm
          *.appimage
    
    - name: Update last release version
      if: steps.check.outputs.should_release == 'true'
      run: |
        VERSION="${{ steps.check.outputs.version }}"
        
        # 更新 last_release_version.txt
        echo "$VERSION" > data/last_release_version.txt
        
        # 提交更改
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/last_release_version.txt data/versions.json
        git commit -m "Update to WeChat Linux v$VERSION" || echo "No changes"
        git push || echo "Nothing to push"